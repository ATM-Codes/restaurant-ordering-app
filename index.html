<html>
    <head>
       <link rel="stylesheet" href="index.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <section id="title_section">
            <h1>Jimmy's Diner</h1>
            <h3>The best burgers and pizzas in town.</h3>
            </section>
            <section id="feed">
            </section>
            <section class="hidden" id="order">
                    <h1>Your order</h1>
                    <div id="order_list">
                    </div>
                    <hr class="order_divider">
                <div id="total">
                    <h1>Total price:</h1>
                    <h2 id="total_amount"></h2>
                </div>
                <button name="complete_btn" type="button" class="complete_btn" id="complete_btn">
                    Complete Order
                </button>
            </section>
        <div class="modal" id="modal">
            <div class="modal-inner" id="modal-inner">
              <div class="close-modal-btn-container">
			    <button class="modal-close-btn" id="modal-close-btn">X</button>
		       </div>
               <div id="form-text-section">
                <h1>Enter you Card Details</h1>
                <form id="payment-form">
                    <input type="text" name="fullName" placeholder="Enter your name" required/>
                    <input type="text" name="cardNumber" placeholder="Enter card number" required/>
                    <input type="text" name="cvv" placeholder="Enter cvv" required/>
                    <div class="modal-choice-btns" id="modal-choice-btns">
                        <button type="submit" class="modal-btn">Pay</button>
                    </div>
                </form>
               </div>
            </div>
        </div>
        <div class="thankyou_message" id="thankyou_message">
        </div>
	    <script type="module" src="index.js"></script>
    </body>
</html>
